name: Discord AI Bots (Hugging Face - 24/7)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  workflow_run:
    workflows: ["Discord AI Bots (Hugging Face - 24/7)"]
    types: [completed]  # Restart immediately when previous run finishes

jobs:
  run-bots:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Discord Bots
        env:
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
          DISCORD_BOT1_TOKEN: ${{ secrets.DISCORD_BOT1_TOKEN }}
          DISCORD_BOT2_TOKEN: ${{ secrets.DISCORD_BOT2_TOKEN }}
        run: |
          timeout 18000 python discord_ai_agents_hf.py || true

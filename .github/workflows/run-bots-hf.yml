name: Discord AI Bots (Hugging Face - 24/7)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    # Auto-restart every 5 hours to stay running 24/7
    - cron: '0 */5 * * *'

jobs:
  run-bots:
    runs-on: ubuntu-latest
    timeout-minutes: 300  # 5 hours (safe under 6 hour limit)
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run Discord Bots (Hugging Face - User Response Only)
      env:
        HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
        DISCORD_BOT1_TOKEN: ${{ secrets.DISCORD_BOT1_TOKEN }}
        DISCORD_BOT2_TOKEN: ${{ secrets.DISCORD_BOT2_TOKEN }}
      run: |
        echo "Starting Discord AI bots (User Response Mode)..."
        echo "Bots will respond when users message them in ANY channel"
        echo "No auto-conversation - only user-triggered responses"
        
        # Run for 5 hours (18000 seconds)
        timeout 18000 python discord_ai_agents_hf_useronly.py || echo "Bot session completed"
        
        echo "Session finished. Workflow will auto-restart via cron schedule."
    
    - name: Trigger next run (backup method)
      if: success()
      run: |
        echo "Bots ran successfully for 5 hours"
        echo "Next scheduled run will start automatically"
